name: Publish prerelease on label

on:
  pull_request:
    types: [closed]
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Compute the next version but do not create the release"
        type: boolean
        default: true

permissions:
  contents: write # gives access to apply the tag
  actions: write # permission to run the workflow for publish

concurrency:
  group: release-publish
  cancel-in-progress: false   # queue merges; every labeled merge should publish

jobs:
  release:
    # Run on a merged, labeled PR, or on any manual dispatch.
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event.pull_request.merged == true &&
       contains(github.event.pull_request.labels.*.name, 'release'))
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false   # checkout only fetches the publish script
      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          enable-cache: true

      - name: Compute and publish prerelease
        id: publish
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Merged-PR runs always publish; manual runs honor the dispatch toggle.
          DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}
        run: |
          # Latest release in the repo; the bump script computes the next one.
          version=$(uv run --script .github/scripts/publish_prerelease.py bump-from "gh release list --json name --jq '.[].name'")
          echo "Next Version: $version"

          if [ "$DRY_RUN" = "true" ]; then
            echo "DRY RUN — Next Version would be: $version"
          else
            gh release create "$version" --prerelease --generate-notes --title "$version"
            gh workflow run publish.yml --ref "$version"
          fi
